name: Compile CV

on:
  push:
    branches: [master]
    paths:
      - 'CV_Cheick_Ba/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX (EN)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv_1page.tex
          working_directory: CV_Cheick_Ba
          latexmk_use_xelatex: true

      - name: Compile LaTeX (IT)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv_1page_translated.tex
          working_directory: CV_Cheick_Ba
          latexmk_use_xelatex: true

      - name: Move PDFs to docs
        run: |
          mv CV_Cheick_Ba/cv_1page.pdf docs/cv/CV_Cheick_Ba_latest.pdf
          mv CV_Cheick_Ba/cv_1page_translated.pdf docs/cv/CV_Cheick_Ba_latest_IT.pdf

      - name: Commit compiled PDFs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: recompile CV PDFs"
          file_pattern: docs/cv/CV_Cheick_Ba_latest.pdf docs/cv/CV_Cheick_Ba_latest_IT.pdf
          push_options: '--force-with-lease'
